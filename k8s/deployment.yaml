apiVersion: apps/v1
kind: Deployment
metadata:
  name: smokestack-api
  namespace: smokestack
  labels:
    app: smokestack-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smokestack-api
  template:
    metadata:
      labels:
        app: smokestack-api
    spec:
      containers:
        - name: smokestack-api
          image: smokestack:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: smokestack-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"