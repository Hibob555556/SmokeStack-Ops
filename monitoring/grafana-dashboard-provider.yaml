apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: smokestack
data:
  dashboard-provider.yaml: |
    apiVersion: 1

    providers:
      - name: SmokeStack Dashboards
        orgId: 1
        folder: SmokeStack
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards