apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: smokestack
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    # Prometheus loads alerting rules from this mounted directory.
    # Keeping rules in a separate ConfigMap makes alert changes easier to review
    # without mixing them into scrape target configuration.
    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: "smokestack-api-pods"
        metrics_path: "/metrics"
        dns_sd_configs:
          - names:
              - "smokestack-api-metrics.smokestack.svc.cluster.local"
            type: A
            port: 8000
        relabel_configs:
          - target_label: service
            replacement: "smokestack-api"
