apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: smokestack
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "smokestack-api"
        metrics_path: "/metrics"
        static_configs:
          - targets:
              - "smokestack-api-service.smokestack.svc.cluster.local:80"