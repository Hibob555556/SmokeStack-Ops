apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: smokestack
data:
  datasource.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service.smokestack.svc.cluster.local:9090
        isDefault: true
        editable: true